<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SCF</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
    <div class="auth-container">
        <div class="auth-form">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join SCF for seamless supply chain financing</p>
            </div>

            <div id="alertContainer"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="name"
                        placeholder="Enter your full name"
                        required
                    >
                    <div class="invalid-feedback">Please provide a valid name.</div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                    <div class="invalid-feedback">Please provide a valid email.</div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input
                        type="tel"
                        class="form-control"
                        id="phone"
                        placeholder="Enter 10-digit phone number"
                        pattern="[0-9]{10}"
                        required
                    >
                    <div class="invalid-feedback">Please provide a valid 10-digit phone number.</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Minimum 6 characters"
                        minlength="6"
                        required
                    >
                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input
                        type="password"
                        class="form-control"
                        id="confirmPassword"
                        placeholder="Re-enter your password"
                        required
                    >
                    <div class="invalid-feedback">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>

                <div class="text-center">
                    <p class="mb-0">
                        Already have an account?
                        <a href="login.html" class="text-primary fw-bold">Login here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate form
            if (!document.getElementById('registerForm').checkValidity() === false) {
                e.stopPropagation();
            }

            // Validate passwords match
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'danger');
                return;
            }

            // Validate phone
            const phone = document.getElementById('phone').value;
            if (!isValidPhone(phone)) {
                showAlert('Please enter a valid 10-digit phone number', 'danger');
                return;
            }

            // Validate email
            const email = document.getElementById('email').value;
            if (!isValidEmail(email)) {
                showAlert('Please enter a valid email address', 'danger');
                return;
            }

            showLoader();

            try {
                const response = await api.register({
                    name: document.getElementById('name').value,
                    email: email,
                    password: password,
                    phone: phone
                });

                hideLoader();
                showAlert('Registration successful! Redirecting to login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                hideLoader();
                const errorMessage = handleAPIError(error);
                showAlert(errorMessage, 'danger');
            }
        });
    </script>
</body>
</html>
