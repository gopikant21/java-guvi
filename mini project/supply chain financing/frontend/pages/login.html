<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCF</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
    <div class="auth-container">
        <div class="auth-form">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your SCF account</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                    <div class="invalid-feedback">Please provide a valid email.</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Enter your password"
                        required
                    >
                    <div class="invalid-feedback">Please provide a password.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>

                <div class="text-center">
                    <p class="mb-0">
                        Don't have an account?
                        <a href="register.html" class="text-primary fw-bold">Register here</a>
                    </p>
                </div>
            </form>

            <hr class="my-4">

            <div class="alert alert-info small" role="alert">
                <strong>Demo Credentials:</strong><br>
                Email: <code>john@example.com</code><br>
                Password: <code>SecurePass123</code>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        // Check if already logged in
        if (isAuthenticated()) {
            const role = getUserRole();
            if (role === 'ADMIN') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate form
            if (!document.getElementById('loginForm').checkValidity() === false) {
                e.stopPropagation();
            }

            showLoader();

            try {
                const response = await api.login({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                hideLoader();
                showAlert('Login successful! Redirecting...', 'success');

                // Determine user role and redirect
                const role = getUserRole();
                setTimeout(() => {
                    if (role === 'ADMIN') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1500);
            } catch (error) {
                hideLoader();
                const errorMessage = handleAPIError(error);
                showAlert(errorMessage, 'danger');
            }
        });
    </script>
</body>
</html>
