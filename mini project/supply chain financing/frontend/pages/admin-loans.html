<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Loans - SCF Admin</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="../index.html">SCF Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="admin-dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="admin-loans.html">All Loans</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin-customers.html">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="dashboard-container">
        <div class="container">
            <div id="alertContainer"></div>

            <!-- Header -->
            <div class="dashboard-header">
                <h1 class="mb-2">Loan Management</h1>
                <p class="text-muted">View and manage all customer loans</p>
            </div>

            <!-- Filters -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="statusFilter" class="form-label">Filter by Status</label>
                            <select class="form-select" id="statusFilter">
                                <option value="">All Status</option>
                                <option value="PENDING">Pending</option>
                                <option value="APPROVED">Approved</option>
                                <option value="REJECTED">Rejected</option>
                                <option value="DISBURSED">Disbursed</option>
                                <option value="PARTIALLY_PAID">Partially Paid</option>
                                <option value="FULLY_PAID">Fully Paid</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="customerFilter" class="form-label">Search Customer</label>
                            <input
                                type="text"
                                class="form-control"
                                id="customerFilter"
                                placeholder="Customer name or ID"
                            >
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="loadLoans()">Apply Filters</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loans Table -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <h5 class="mb-0">All Loans</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Loan Number</th>
                                    <th>Customer</th>
                                    <th>Amount</th>
                                    <th>Interest Rate</th>
                                    <th>Status</th>
                                    <th>Created Date</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="loansTable">
                                <tr>
                                    <td colspan="7" class="text-center text-muted py-4">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loan Action Modal -->
    <div class="modal fade" id="loanActionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Loan Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalContent"></div>
                </div>
                <div class="modal-footer" id="modalFooter"></div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        requireAdmin();

        let allLoans = [];

        // Load loans
        async function loadLoans() {
            showLoader();
            try {
                const status = document.getElementById('statusFilter').value;
                const loans = await api.getAllLoans({ status: status || undefined });

                allLoans = loans;
                displayLoans(loans);
                hideLoader();
            } catch (error) {
                hideLoader();
                console.error('Error loading loans:', error);
                showAlert(handleAPIError(error), 'danger');
            }
        }

        // Display loans
        function displayLoans(loans) {
            const table = document.getElementById('loansTable');

            if (loans.length === 0) {
                table.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No loans found</td></tr>';
                return;
            }

            let html = '';
            loans.forEach(loan => {
                const statusColor = getStatusColorClass(loan.status);
                html += `
                    <tr>
                        <td class="fw-bold">${loan.loanNumber}</td>
                        <td>${loan.customerName}</td>
                        <td>${formatCurrency(loan.amount)}</td>
                        <td>${loan.interestRate}%</td>
                        <td><span class="badge bg-${statusColor}">${loan.status.replace(/_/g, ' ')}</span></td>
                        <td>${formatDate(loan.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewLoanDetails(${loan.id})">
                                View
                            </button>
                        </td>
                    </tr>
                `;
            });

            table.innerHTML = html;
        }

        // View loan details
        async function viewLoanDetails(loanId) {
            showLoader();
            try {
                const data = await api.getAdminLoanDetails(loanId);
                const repayments = await api.getAdminLoanRepayments(loanId);

                hideLoader();
                displayLoanModal(data, repayments);
            } catch (error) {
                hideLoader();
                console.error('Error loading loan details:', error);
                showAlert(handleAPIError(error), 'danger');
            }
        }

        // Display loan modal
        function displayLoanModal(data, repayments) {
            const loan = data.loan;
            const customer = data.customer;
            const statusColor = getStatusColorClass(loan.status);

            let repaymentHTML = '<h6 class="mb-3">Repayment History</h6>';
            if (repayments.length > 0) {
                repaymentHTML += '<div class="table-responsive"><table class="table table-sm"><thead class="table-light"><tr><th>Date</th><th>Amount</th><th>Mode</th></tr></thead><tbody>';
                repayments.forEach(r => {
                    repaymentHTML += `<tr><td>${formatDate(r.paymentDate)}</td><td>${formatCurrency(r.amount)}</td><td>${r.paymentMode}</td></tr>`;
                });
                repaymentHTML += '</tbody></table></div>';
            } else {
                repaymentHTML += '<p class="text-muted">No repayments made yet</p>';
            }

            const modalContent = `
                <div class="mb-3">
                    <h6 class="text-primary">${loan.loanNumber}</h6>
                    <span class="badge bg-${statusColor}">${loan.status.replace(/_/g, ' ')}</span>
                </div>

                <hr>

                <h6>Customer Details</h6>
                <p><strong>Name:</strong> ${customer.name}</p>
                <p><strong>Email:</strong> ${customer.email}</p>
                <p><strong>Phone:</strong> ${customer.phone}</p>

                <hr>

                <h6>Loan Details</h6>
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Amount:</strong> ${formatCurrency(loan.amount)}</p>
                        <p><strong>Interest Rate:</strong> ${loan.interestRate}%</p>
                        <p><strong>Tenure:</strong> ${loan.tenureMonths} months</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Purpose:</strong> ${loan.purpose}</p>
                        <p><strong>Created:</strong> ${formatDate(loan.createdAt)}</p>
                        <p><strong>Remaining:</strong> ${formatCurrency(loan.remainingAmount)}</p>
                    </div>
                </div>

                ${loan.status === 'REJECTED' ? `<p class="text-danger"><strong>Rejection Reason:</strong> ${loan.rejectionReason}</p>` : ''}

                <hr>

                ${repaymentHTML}
            `;

            let footerHTML = '';
            if (loan.status === 'PENDING') {
                footerHTML = `
                    <button type="button" class="btn btn-success" onclick="approveLoanAction(${loan.id})">Approve</button>
                    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#rejectModal" onclick="prepareReject(${loan.id})">Reject</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                `;
            } else if (loan.status === 'APPROVED') {
                footerHTML = `
                    <button type="button" class="btn btn-info" onclick="disburseLoanAction(${loan.id})">Disburse</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                `;
            } else {
                footerHTML = `<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>`;
            }

            document.getElementById('modalContent').innerHTML = modalContent;
            document.getElementById('modalFooter').innerHTML = footerHTML;

            const modal = new bootstrap.Modal(document.getElementById('loanActionModal'));
            modal.show();
        }

        // Approve loan
        async function approveLoanAction(loanId) {
            if (confirm('Are you sure you want to approve this loan?')) {
                showLoader();
                try {
                    await api.approveLoan(loanId);
                    hideLoader();
                    showAlert('Loan approved successfully!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('loanActionModal')).hide();
                    loadLoans();
                } catch (error) {
                    hideLoader();
                    showAlert(handleAPIError(error), 'danger');
                }
            }
        }

        // Disburse loan
        async function disburseLoanAction(loanId) {
            if (confirm('Are you sure you want to disburse this loan?')) {
                showLoader();
                try {
                    await api.disburseLoan(loanId);
                    hideLoader();
                    showAlert('Loan disbursed successfully!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('loanActionModal')).hide();
                    loadLoans();
                } catch (error) {
                    hideLoader();
                    showAlert(handleAPIError(error), 'danger');
                }
            }
        }

        // Prepare reject
        let rejectLoanId = null;
        function prepareReject(loanId) {
            rejectLoanId = loanId;
        }

        // Initial load
        loadLoans();
    </script>

    <!-- Reject Modal -->
    <div class="modal fade" id="rejectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reject Loan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label for="rejectionReason" class="form-label">Reason for Rejection</label>
                    <textarea
                        class="form-control"
                        id="rejectionReason"
                        rows="4"
                        placeholder="Enter reason for rejection"
                        required
                    ></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="rejectLoanAction()">Reject Loan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Reject loan
        async function rejectLoanAction() {
            const reason = document.getElementById('rejectionReason').value;

            if (!reason.trim()) {
                showAlert('Please provide a rejection reason', 'warning');
                return;
            }

            showLoader();
            try {
                await api.rejectLoan(rejectLoanId, reason);
                hideLoader();
                showAlert('Loan rejected successfully!', 'success');

                bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
                bootstrap.Modal.getInstance(document.getElementById('loanActionModal')).hide();
                document.getElementById('rejectionReason').value = '';
                loadLoans();
            } catch (error) {
                hideLoader();
                showAlert(handleAPIError(error), 'danger');
            }
        }
    </script>
</body>
</html>
