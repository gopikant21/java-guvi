<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="mark">SCF</span>
      <span>Supply Chain Financing</span>
    </div>

    <nav class="menu" aria-label="Main navigation">
      @if (role() === 'CUSTOMER') {
        <a routerLink="/customer" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Customer</a>
      }

      @if (role() === 'ADMIN') {
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Admin</a>
      }

      <button class="btn ghost" type="button" (click)="logout()">Logout</button>
    </nav>
  </header>

  <main class="content-area">
    <router-outlet />
  </main>
</div>
