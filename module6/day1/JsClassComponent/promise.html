<body>
    <button onclick="demo()">Click Me</button>
    <script>
        function mypromise(){
            return new Promise((resolve, reject)=>{
                console.log("start");

                setTimeout(()=>{
                    let ans = Math.round(Math.random());
                    if(ans==1) resolve();
                    else reject();
                }, Math.random()*10*1000);

                console.log("Exit!!")
            })

        };
