<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-5 sm:px-6">
    <header
      class="sticky top-4 z-20 mb-6 rounded-2xl border border-white/10 bg-slate-900/60 p-3 shadow-2xl backdrop-blur"
    >
      <div class="flex flex-wrap items-center justify-between gap-3">
        <a routerLink="/" class="flex items-center gap-2">
          <span class="h-2.5 w-2.5 rounded-full bg-cyan-400 shadow-[0_0_18px_2px_rgba(34,211,238,0.7)]"></span>
          <span class="text-sm font-semibold tracking-wide text-slate-100">Store Nexus</span>
        </a>

        <nav class="flex items-center gap-2 text-sm">
          <a
            routerLink="/"
            routerLinkActive="nav-link-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
          >
            Home
          </a>
          <a routerLink="/products" routerLinkActive="nav-link-active" class="nav-link">Products</a>
          <a routerLink="/books" routerLinkActive="nav-link-active" class="nav-link">Books</a>
        </nav>
      </div>
    </header>

    <main class="grow animate-fade-in pb-4">
      <router-outlet />
    </main>
  </div>
</div>
