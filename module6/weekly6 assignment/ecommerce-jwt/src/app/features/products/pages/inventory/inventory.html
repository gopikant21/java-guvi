<!-- src/app/features/products/pages/inventory/inventory.html -->
<h2>Low Stock Inventory</h2>

<p>
  <label>
    Threshold:
    <input
      type="number"
      [value]="threshold()"
      (change)="setThreshold($any($event.target).value)"
      min="0"
    />
  </label>
  <button type="button" (click)="fetchLowStock()">Refresh</button>
</p>

@if (loading()) {
  <p>Loading...</p>
} @else if (errorMessage()) {
  <p>{{ errorMessage() }}</p>
} @else if (products().length === 0) {
  <p>No low stock products.</p>
} @else {
  <ul>
    @for (p of products(); track p.id) {
      <li>{{ p.name }} (Stock: {{ p.stocks }})</li>
    }
  </ul>
}
