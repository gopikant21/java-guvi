<!-- src/app/features/products/pages/add-product/add-product.html -->
<h2>Add Product</h2>

@if (errorMessage()) {
  <p>{{ errorMessage() }}</p>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <p><input type="text" placeholder="Name" formControlName="name" /></p>
  <p><input type="text" placeholder="Description" formControlName="description" /></p>
  <p><input type="text" placeholder="Brand" formControlName="brand" /></p>

  <p>
    <select formControlName="category">
      @for (c of categories; track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
  </p>

  <p><input type="number" placeholder="Price" formControlName="price" /></p>
  <p><input type="number" placeholder="Stocks" formControlName="stocks" /></p>

  <button type="submit" [disabled]="submitting()">
    {{ submitting() ? 'Saving...' : 'Create' }}
  </button>
</form>
