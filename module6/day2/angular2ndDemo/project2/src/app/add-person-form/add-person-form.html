<form (ngSubmit)="addPerson()" #personForm="ngForm" class="d-flex gap-2 align-items-end">
  <div class="flex-grow-1">
    <label for="name" class="form-label mb-1">Name</label>
    <input type="text" id="name" class="form-control form-control-sm" required [(ngModel)]="newPerson.name" name="name" #name="ngModel" placeholder="Enter name">
    <div *ngIf="name.invalid && name.touched" class="text-danger small">Required</div>
  </div>
  <div class="flex-grow-1">
    <label for="age" class="form-label mb-1">Age</label>
    <input type="number" id="age" class="form-control form-control-sm" required [(ngModel)]="newPerson.age" name="age" #age="ngModel" placeholder="Enter age">
    <div *ngIf="age.invalid && age.touched" class="text-danger small">Required</div>
  </div>
  <div class="flex-grow-1">
    <label for="email" class="form-label mb-1">Email</label>
    <input type="email" id="email" class="form-control form-control-sm" required [(ngModel)]="newPerson.email" name="email" #email="ngModel" placeholder="Enter email">
    <div *ngIf="email.invalid && email.touched" class="text-danger small">Required</div>
  </div>
  <button type="submit" class="btn btn-success btn-sm" [disabled]="personForm.invalid">Add</button>
</form>
