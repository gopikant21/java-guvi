<div class="container mt-5">
  <div class="row mb-4">
    <div class="col-12">
      <h1 class="text-primary">People List</h1>
      <hr>
    </div>
  </div>
  <div class="row mb-4">
    <div class="col-md-6">
      <app-add-person-form (personAdded)="addNewPerson($event)"></app-add-person-form>
    </div>
  </div>
  <div class="row g-4">
    @for(person of people; track person.id) {
      <div class="col-md-6 col-lg-4">
        <app-person [p]="person" (personRemoved)="removePerson($event)" (personUpdated)="updatePerson($event)"></app-person>
      </div>
    }
  </div>
</div>
