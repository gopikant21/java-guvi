<div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-lg border border-gray-700 p-4 mb-6">
  <form (ngSubmit)="addTodo()" class="flex gap-3">
    <div class="flex-1">
      <input 
        type="text" 
        [(ngModel)]="newTodo.title" 
        name="title"
        placeholder="Title..." 
        class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors text-sm"
        required>
    </div>

    <div class="flex-1">
      <input 
        type="text"
        [(ngModel)]="newTodo.description" 
        name="description"
        placeholder="Description..." 
        class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors text-sm"
        required>
    </div>

    <button 
      type="submit" 
      [disabled]="!newTodo.title.trim() || !newTodo.description.trim()"
      class="px-4 py-2 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium rounded transition-all text-sm whitespace-nowrap">
      Add
    </button>
  </form>
</div>
