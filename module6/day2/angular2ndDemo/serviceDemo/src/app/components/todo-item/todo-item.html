<div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded border border-gray-700 hover:border-blue-500 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/20 p-3 group">
  @if (!isEditMode) {
    <!-- View Mode -->
    <!-- Header -->
    <div class="flex items-start justify-between mb-2">
      <div class="flex items-center gap-2 flex-1">
        <button (click)="toggleStatus()" class="w-4 h-4 rounded-full flex-shrink-0 transition-colors" [class.bg-green-500]="todo.completed" [class.bg-gray-700]="!todo.completed"></button>
        <h3 class="text-sm font-semibold text-white group-hover:text-blue-400 transition-colors" [class.line-through]="todo.completed" [class.text-gray-400]="todo.completed">
          {{todo.title}}
        </h3>
      </div>
    </div>

    <!-- Description -->
    <p class="text-gray-300 text-xs mb-2 ml-6 line-clamp-2">
      {{todo.description}}
    </p>

    <!-- Status Badge -->
    <div class="flex gap-2 ml-6">
      @if (todo.completed) {
        <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-green-500/20 text-green-300 text-xs font-medium">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
          Done
        </span>
      } @else {
        <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-yellow-500/20 text-yellow-300 text-xs font-medium">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          Todo
        </span>
      }
    </div>

    <!-- Footer -->
    <div class="mt-2 pt-2 border-t border-gray-700 flex gap-1">
      <button (click)="startEdit()" class="flex-1 px-2 py-1 rounded text-xs bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors">
        Edit
      </button>
      <button (click)="deleteTodo()" class="flex-1 px-2 py-1 rounded text-xs bg-red-600/20 hover:bg-red-600 text-red-300 hover:text-white font-medium transition-colors">
        Delete
      </button>
    </div>
  } @else {
    <!-- Edit Mode -->
    <div class="space-y-2">
      <h4 class="text-white font-semibold text-sm">Edit</h4>
      
      <div>
        <input type="text" [(ngModel)]="editData.title" placeholder="Title" class="w-full px-2 py-1 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors text-sm">
      </div>

      <div>
        <textarea [(ngModel)]="editData.description" placeholder="Description" class="w-full px-2 py-1 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors text-sm" rows="2"></textarea>
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" [(ngModel)]="editData.completed" class="w-3 h-3 rounded bg-gray-700 border-gray-600 text-blue-600 cursor-pointer">
        <label class="text-gray-300 text-xs cursor-pointer">Completed</label>
      </div>

      <div class="flex gap-1 pt-2 border-t border-gray-700">
        <button (click)="saveEdit()" class="flex-1 px-2 py-1 rounded text-xs bg-green-600 hover:bg-green-700 text-white font-medium transition-colors">
          Save
        </button>
        <button (click)="cancelEdit()" class="flex-1 px-2 py-1 rounded text-xs bg-gray-700 hover:bg-gray-600 text-white font-medium transition-colors">
          Cancel
        </button>
      </div>
    </div>
  }
</div>
