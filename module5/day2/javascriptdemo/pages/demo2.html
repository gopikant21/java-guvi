<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
   <button onclick="demo()">Click Me</button>

   <div id="eventStatus"></div>

<script>
    function demo() {
        document.getElementById('eventStatus').innerText = 'Button clicked!';
        document.getElementById('eventStatus').innerHTML = "<h1> Hello button clicked!! </h1>";
    }
</script>
</html>
