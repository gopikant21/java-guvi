<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <form method="post" action="registrationForm.asp">

    <label for="username">Username:</label>
    <input type="text" name="username" id="username">
    <br><br>
    <label for="password">Password:</label>
    <input type="password" name="password" id="password">
    <br><br>
    gender: <input type="radio" name="gender" id="male" value="male"/>M
            <input type="radio" name="gender" id="female" value="female"/>F
    <br><br>
    skills:
    <input type="checkbox" name="skills" id="html" value="html"/>HTML
    <input type="checkbox" name="skills" id="css" value="css"/>CSS
    <input type="checkbox" name="skills" id="javascript" value="javascript"/>Javascript
    <input type="checkbox" name="skills" id="php" value="php"/>PHP
    <br><br>
    <input type="submit">

  </form>
</body>
</html>
