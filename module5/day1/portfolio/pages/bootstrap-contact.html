<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkyTrail Bootstrap - Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="bootstrap.html">SkyTrail</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="bootstrap.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="bootstrap-packages.html">Packages</a></li>
        <li class="nav-item"><a class="nav-link" href="bootstrap-gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link active" href="bootstrap-contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <div class="p-4 mb-4 bg-body-tertiary rounded-3 border">
    <h1 class="h3 mb-2">Contact Us</h1>
    <p class="mb-0">Tell us your destination and travel dates. We will call you back.</p>
  </div>

  <div class="row g-4">
    <div class="col-12 col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label class="form-label" for="name">Name</label>
              <input class="form-control" id="name" type="text" placeholder="Your full name">
            </div>
            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" type="email" placeholder="you@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label" for="destination">Destination</label>
              <select class="form-select" id="destination">
                <option>Goa</option>
                <option>Manali</option>
                <option>Jaipur</option>
              </select>
            </div>
            <button class="btn btn-primary" type="button">Submit</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-5">
      <div class="card h-100 border-info">
        <img src="../img/logo.jpg" class="card-img-top" alt="SkyTrail logo">
        <div class="card-body">
          <h5 class="card-title">SkyTrail Support</h5>
          <p class="card-text mb-1"><strong>Phone:</strong> +91 98765 43210</p>
          <p class="card-text mb-1"><strong>Email:</strong> hello@skytrail.com</p>
          <p class="card-text"><strong>Hours:</strong> Mon-Sat, 9 AM - 7 PM</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
