<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Person Details Form</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <h2 class="mb-4">Person Form and Details</h2>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Enter Details</h5>
                    <form id="personForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="mobile" class="form-label">Mobile</label>
                            <input type="tel" id="mobile" class="form-control" pattern="[0-9]{10}" placeholder="10 digit mobile" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Skills</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="HTML" id="skillHtml" name="skills">
                                <label class="form-check-label" for="skillHtml">HTML</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="CSS" id="skillCss" name="skills">
                                <label class="form-check-label" for="skillCss">CSS</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="JavaScript" id="skillJs" name="skills">
                                <label class="form-check-label" for="skillJs">JavaScript</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="Java" id="skillJava" name="skills">
                                <label class="form-check-label" for="skillJava">Java</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit</button>
                        <button type="reset" class="btn btn-secondary">Reset</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title mb-3">Current Person Details</h5>
                    <p class="mb-2"><strong>Name:</strong> <span id="dName">-</span></p>
                    <p class="mb-2"><strong>Email:</strong> <span id="dEmail">-</span></p>
                    <p class="mb-2"><strong>Mobile:</strong> <span id="dMobile">-</span></p>
                    <p class="mb-0"><strong>Skills:</strong> <span id="dSkills">-</span></p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Previous Person Records</h5>
                    <div id="history" class="small text-muted">No records yet.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const personForm = document.getElementById('personForm');
    const historyBox = document.getElementById('history');
    const records = [];

    personForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        const selectedSkills = Array.from(document.querySelectorAll('input[name="skills"]:checked'))
            .map(skill => skill.value);

        document.getElementById('dName').textContent = name || '-';
        document.getElementById('dEmail').textContent = email || '-';
        document.getElementById('dMobile').textContent = mobile || '-';
        document.getElementById('dSkills').textContent = selectedSkills.length ? selectedSkills.join(', ') : '-';

        records.unshift({ name, email, mobile, skills: selectedSkills });
        renderHistory();

        personForm.reset();
    });

    function renderHistory() {
        if (records.length === 0) {
            historyBox.textContent = 'No records yet.';
            return;
        }

        historyBox.innerHTML = records
            .map(function (record, index) {
                const skillsText = record.skills.length ? record.skills.join(', ') : '-';
                return '<div class="border rounded p-2 mb-2">'
                    + '<div><strong>#' + (index + 1) + '</strong></div>'
                    + '<div><strong>Name:</strong> ' + record.name + '</div>'
                    + '<div><strong>Email:</strong> ' + record.email + '</div>'
                    + '<div><strong>Mobile:</strong> ' + record.mobile + '</div>'
                    + '<div><strong>Skills:</strong> ' + skillsText + '</div>'
                    + '</div>';
            })
            .join('');
    }
</script>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
