<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        .game-cell {
            height: 90px;
            font-size: 2rem;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <h2 class="text-center mb-3">Tic Tac Toe</h2>
            <p id="status" class="text-center fw-semibold">Turn: X</p>

            <div class="row g-2" id="board">
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="0"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="1"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="2"></button></div>

                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="3"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="4"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="5"></button></div>

                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="6"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="7"></button></div>
                <div class="col-4"><button class="btn btn-outline-primary w-100 game-cell" data-index="8"></button></div>
            </div>

            <div class="text-center mt-3">
                <button id="resetBtn" class="btn btn-secondary">Reset Game</button>
            </div>
        </div>
    </div>
</div>

<script>
    const cells = document.querySelectorAll('.game-cell');
    const statusText = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');

    let clickCount = 0;
    let gameOver = false;
    const board = ['', '', '', '', '', '', '', '', ''];

    const winPatterns = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
    ];

    function checkWinner() {
        for (let i = 0; i < winPatterns.length; i++) {
            const [a, b, c] = winPatterns[i];
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return board[a];
            }
        }
        return null;
    }

    function endGame(message) {
        gameOver = true;
        statusText.textContent = message;
        cells.forEach(cell => {
            cell.disabled = true;
        });
    }

    function handleCellClick(event) {
        const cell = event.target;
        const index = Number(cell.dataset.index);

        if (gameOver || board[index] !== '') {
            return;
        }

        const symbol = clickCount % 2 === 0 ? 'X' : 'O';
        cell.textContent = symbol;
        board[index] = symbol;
        clickCount++;

        const winner = checkWinner();
        if (winner) {
            endGame('Winner: ' + winner);
            return;
        }

        if (clickCount === 9) {
            endGame('Match Draw');
            return;
        }

        statusText.textContent = 'Turn: ' + (clickCount % 2 === 0 ? 'X' : 'O');
    }

    function resetGame() {
        clickCount = 0;
        gameOver = false;

        for (let i = 0; i < board.length; i++) {
            board[i] = '';
        }

        cells.forEach(cell => {
            cell.textContent = '';
            cell.disabled = false;
        });

        statusText.textContent = 'Turn: X';
    }

    cells.forEach(cell => {
        cell.addEventListener('click', handleCellClick);
    });

    resetBtn.addEventListener('click', resetGame);
</script>
</body>
</html>
