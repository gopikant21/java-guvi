spring.application.name=libraryjwt
spring.application.version=1.0.0

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/jpademo
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration (Task 8)
jwt.secret.key=your-super-secret-key-that-is-at-least-32-characters-long-for-hs512!
jwt.expiration.time=3600000

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.libraryjwt=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Server Configuration
server.port=8080
server.servlet.context-path=/api-service

